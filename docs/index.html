<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Goalz</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f4f6;
      --card: rgba(255, 255, 255, 0.8);
      --text: #161a22;
      --muted: #5c6473;
      --accent: #ff6b5e;
      --border: rgba(22, 26, 34, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255, 107, 94, 0.16), transparent 32%),
        radial-gradient(circle at bottom right, rgba(114, 199, 255, 0.18), transparent 34%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 48px 20px;
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 18px 50px rgba(22, 26, 34, 0.08);
    }

    h1 {
      font-size: clamp(40px, 7vw, 64px);
      line-height: 0.95;
      margin: 0 0 14px;
      letter-spacing: -0.04em;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      color: var(--muted);
      margin: 0 0 18px;
    }

    .links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    a.button {
      display: inline-block;
      text-decoration: none;
      color: white;
      background: var(--accent);
      border-radius: 999px;
      padding: 14px 20px;
      font-weight: 600;
    }

    a.text-link {
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      padding: 14px 6px;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Goalz</h1>
      <p>Goalz is a premium iPhone app for tracking one active goal with a clean countdown and Home Screen and Lock Screen widgets.</p>
      <p>Set the goal, keep it visible every day, and stay focused without clutter, ads, or account setup.</p>
      <div class="links">
        <a class="button" href="./privacy/">Privacy Policy</a>
        <a class="text-link" href="./support/">Support</a>
      </div>
    </section>
  </main>
</body>
</html>
