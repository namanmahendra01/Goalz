name: Google Ads — Goalz daily manager

# Fully automated: creates the managed App campaign if missing, then checks it daily.
# If trailing campaign ROAS falls below the configured floor after meaningful spend,
# the campaign is paused instead of continuing to burn spend.

on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * *"

jobs:
  launch:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
      GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
      GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
      GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
      GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
      GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
      GOOGLE_ADS_MIN_ROAS: "5"
      GOOGLE_ADS_MIN_SPEND_BEFORE_PAUSE_USD: "15"
      GOOGLE_ADS_ROAS_LOOKBACK_DAYS: "7"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements-growth.txt

      - name: Launch or manage App campaign
        run: |
          python3 -m growth_agent.cli google-ads-launch \
            --manifest growth_agent/marketing/app_manifest.json \
            --ad-copy growth_agent/marketing/ad_copy.json

      - name: Summary
        run: |
          echo "Google Ads daily manager finished. Campaign **Goalz Autonomous Launch** is created if missing, and paused if 7-day ROAS drops below 5 after at least $15 spend." >> "$GITHUB_STEP_SUMMARY"
